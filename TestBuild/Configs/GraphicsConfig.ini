; 星际战舰 - 图形配置文件
; Star Ship Graphics Configuration
; 支持Intel、AMD、NVIDIA全系列显卡

[Graphics]
; 渲染质量预设
; 可选: Ultra, High, Medium, Low, Potato
RenderQuality=Medium

; 渲染管线
; 可选: HDRP, URP, Legacy
RenderPipeline=URP

; 分辨率
ResolutionWidth=1920
ResolutionHeight=1080
Fullscreen=Disabled
Windowed=Enabled
BorderlessWindow=Disabled
VSync=Enabled
VSyncInterval=1

; 帧率限制
FrameRateLimit=60
FrameRateLimitEnabled=Enabled

; 抗锯齿
AntiAliasing=FXAA
AntiAliasingQuality=Medium

; 纹理质量
TextureQuality=Medium
AnisotropicFiltering=4
MipMapBias=0
TextureStreaming=Enabled
TextureStreamingMemoryBudget=512

; 阴影
ShadowQuality=Medium
ShadowResolution=1024
ShadowDistance=500
ShadowSoftness=Low
ShadowCascades=2

; 光照
LightingQuality=Medium
AmbientOcclusion=Enabled
AmbientOcclusionQuality=Low
GlobalIllumination=Disabled
RealtimeGI=Disabled
BakedGI=Enabled

; 后处理
PostProcessing=Enabled
Bloom=Enabled
BloomQuality=Low
DepthOfField=Disabled
MotionBlur=Disabled
ChromaticAberration=Disabled
Vignette=Enabled
Grain=Disabled
ColorGrading=Enabled
Fog=Enabled

; 粒子
ParticleQuality=Medium
ParticleCount=5000
ParticleDistance=1000

; 水面
WaterQuality=Low
WaterReflections=Disabled
WaterRefractions=Disabled

; 植被
VegetationQuality=Low
VegetationDistance=500
VegetationWind=Enabled

; 环境光遮蔽
SSAO=Enabled
SSAOSamples=8
SSAORadius=1.0
SSAOBias=0.05

; 动态模糊
MotionBlurQuality=Low
MotionBlurStrength=0.1

; 景深
DOFQuality=Low
DOFAperture=16
DOFFocusDistance=10
DOFBladeCount=6

; 色彩校正
ColorGradingMode=ACES
ColorGradingLUTSize=32

[RayTracing]
; 光线追踪设置（仅NVIDIA RTX显卡支持）
RayTracing=Disabled
RayTracingQuality=Low
RayTracingGlobalIllumination=Disabled
RayTracingReflections=Disabled
RayTracingShadows=Disabled
RayTracingAmbientOcclusion=Disabled
RayTracingDenoiser=Enabled
RayTracingSampleCount=16
RayTracingMaxBounces=2
RayTracingMaxDistance=1000

[DLSS]
; DLSS设置（仅NVIDIA RTX显卡支持）
DLSS=Disabled
DLSSMode=Quality
DLSSSharpness=0.5
DLSSFG=Disabled

[AMD FSR]
; FSR设置（支持AMD和Intel显卡）
FSR=Enabled
FSRMode=Quality
FSRSharpness=0.8

[Intel XeSS]
; XeSS设置（仅Intel Arc显卡支持）
XeSS=Disabled
XeSSMode=Quality

[Performance]
; 性能优化设置
MultiThreadedRendering=Enabled
GPUInstancing=Enabled
DynamicBatching=Enabled
StaticBatching=Enabled
LOD=Enabled
LODBias=0
MaxLOD=5
MinLOD=0
LODDistance=1000
OcclusionCulling=Enabled
FrustumCulling=Enabled
DistanceCulling=Enabled
DistanceCullingThreshold=2000
TextureCompression=BC3
MeshCompression=Enabled
ShaderPreloading=Enabled
AsyncShaderCompilation=Enabled

[Compatibility]
; 兼容性设置
; 启用此选项以支持旧显卡
LegacyHardwareSupport=Enabled
LowEndDeviceMode=Enabled
IntelHD4000Support=Enabled
MXSeriesSupport=Enabled
AMDRadeonSupport=Enabled
VulkanSupport=Enabled
OpenGLES3Support=Enabled

[Debug]
ShowFPS=Enabled
ShowStats=Disabled
ShowDrawCalls=Disabled
ShowTriangles=Disabled
ShowMemory=Disabled
ShowGPU=Disabled
ShowVRAM=Disabled
ShowFrameTime=Disabled
ShowThreadTime=Disabled

[Advanced]
MaxTextureSize=2048
MaxCubemapSize=1024
MaxResolution=2560
MaxFrameRate=144
TextureMemoryBudget=1024
RenderTargetScale=1.0
MSAASamples=0
TXAA=Disabled
FXAA=Enabled
SMAA=Disabled
TemporalAA=Disabled
ScreenSpaceReflections=Disabled
ScreenSpaceShadows=Disabled
SubsurfaceScattering=Disabled
VolumetricLighting=Disabled
LightShafts=Disabled
Clouds=Disabled
Atmosphere=Enabled
AtmosphereQuality=Low
Stars=Enabled
StarCount=5000
Galaxy=Enabled
GalaxyQuality=Low

[VR]
VREnabled=Disabled
VRMSAA=0
VRResolutionScale=1.0
VRFoveatedRendering=Disabled
VRFoveatedQuality=Medium
